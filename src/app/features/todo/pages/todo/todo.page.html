<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="ion-text-center title-center">
      Mis Tareas
      <ion-icon name="heart" color="primary"></ion-icon>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  @if (todos$ | async; as todos) {
    @if (todos.length > 0) {
      <ion-list>
        @for (todo of todos; track todo.id) {
          <app-todo-item 
            [todo]="todo" 
            [category]="categoryById(todo.categoryId)"
            (toggle)="toggleTodoCompletion(todo.id)">
          </app-todo-item>
        }
      </ion-list>
    } @else {
      <div class="empty-state ion-text-center ion-padding">
        <p>No tienes tareas registradas.</p>
        <p>¡Agrega tu primera tarea usando el botón +!</p>
      </div>
    }
  } @else {
    <div class="loading-state">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Cargando tareas...</p>
    </div>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <div class="fab-group">
      <ion-fab-button size="small" class="categories-fab" (click)="openCategories()" aria-label="Gestionar categorias">
        <ion-icon name="pricetags-outline"></ion-icon>
      </ion-fab-button>

      <ion-fab-button class="add-fab" (click)="openAddTodo()" aria-label="Crear tarea">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </div>
  </ion-fab>

</ion-content>
