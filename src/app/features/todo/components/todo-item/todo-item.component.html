@let todoValue = todo();

<ion-item-sliding>
  <ion-item class="todo-card" lines="none" [class.is-completed]="todoValue.completed">
    <ion-button
      slot="start"
      fill="clear"
      class="check-btn"
      (click)="onToggle()"
      [attr.aria-label]="todoValue.completed ? 'Marcar como pendiente' : 'Marcar como completada'">
      <ion-icon [name]="todoValue.completed ? 'checkmark-circle' : 'ellipse-outline'"></ion-icon>
    </ion-button>

    <ion-label>
      <h3>{{ todoValue.title }}</h3>
      <div class="meta-row">
        <span class="category-chip" [style.--category-color]="categoryColor()">
          {{ categoryName() }}
        </span>
        <p>{{ todoValue.createdAt | date: 'short' }}</p>
      </div>
    </ion-label>

    <ion-button slot="end" fill="clear" class="edit-btn" (click)="onEdit()" aria-label="Editar tarea">
      <ion-icon name="create-outline"></ion-icon>
    </ion-button>
  </ion-item>

  <ion-item-options side="end">
    <ion-item-option color="primary" (click)="onEdit()">
      <ion-icon name="create-outline" slot="start"></ion-icon>
      Editar
    </ion-item-option>
    <ion-item-option color="danger" (click)="onDelete()">
      <ion-icon name="trash-outline" slot="start"></ion-icon>
      Eliminar
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
